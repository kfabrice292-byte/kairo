<!DOCTYPE html>
<html lang="fr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - Kaïro</title>
    <link rel="icon" type="image/png" href="assets/img/Favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/base.css">
    <style>
        .avatar-upload:hover .avatar-placeholder { border-color: #F97316; background-color: rgba(249,115,22,0.05); }
    </style>
</head>
<body class="bg-slate-50 flex flex-col min-h-screen text-slate-800 font-sans relative">

    <div class="absolute inset-0 z-[-1] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-orange-100/30 via-white to-white pointer-events-none"></div>

    <!-- Header -->
    <header class="w-full sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-200 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="dashboard.html" class="flex items-center gap-1 hover:opacity-80 transition-opacity">
                <img src="assets/img/logo.png" alt="Kaïro" class="h-8 object-contain">
            </a>
            
            <nav class="flex items-center gap-6">
                <a href="dashboard.html" class="text-sm font-medium px-5 py-2.5 rounded-full border border-slate-300 text-slate-700 hover:bg-slate-50 hover:border-slate-400 transition-all">
                    Retour
                </a>
            </nav>
        </div>
    </header>

    <main class="flex-1 w-full max-w-6xl mx-auto px-4 py-12">
        <div class="mb-10 animate-[slideUpFade_0.4s_ease-out]">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2 font-outfit">Mon Profil</h1>
            <p class="text-slate-500">Mettez à jour vos informations pour des générations de CV plus précises.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-[slideUpFade_0.6s_ease-out]">
            
            <!-- Left Column: Profile Form -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
                    
                    <div class="flex items-center gap-6 mb-8 pb-8 border-b border-slate-100">
                        <label class="avatar-upload relative w-32 h-32 rounded-full cursor-pointer group">
                            <input type="file" id="photoInput" accept="image/*" class="hidden">
                            <img id="avatarPreview" src="" alt="Photo" class="w-full h-full object-cover rounded-full hidden z-10 relative">
                            <div class="avatar-placeholder absolute inset-0 flex flex-col items-center justify-center border-2 border-dashed border-slate-300 rounded-full bg-slate-50 text-slate-400 transition-all z-0">
                                <i class="ph-fill ph-camera text-3xl mb-1"></i>
                                <span class="text-[10px] font-bold uppercase tracking-wider">Photo</span>
                            </div>
                        </label>
                        <div>
                            <h2 class="text-2xl font-bold text-slate-900" id="userDisplayName">--</h2>
                            <p class="text-sm text-[#F97316] font-medium mt-1">Candidat Actif</p>
                        </div>
                    </div>
                    
                    <form id="profileForm" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Nom complet *</label>
                                <input type="text" id="fullname" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#F97316]/20 focus:border-[#F97316] transition-all" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Adresse Email</label>
                                <input type="email" id="email" class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl text-sm text-slate-500 cursor-not-allowed" readonly>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Titre professionnel</label>
                                <input type="text" id="specialty" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#F97316]/20 focus:border-[#F97316] transition-all" placeholder="Ex: Developpeur Fullstack">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Téléphone</label>
                                <input type="tel" id="phone" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#F97316]/20 focus:border-[#F97316] transition-all" placeholder="+226 00 00 00 00">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Ville de résidence</label>
                                <input type="text" id="city" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#F97316]/20 focus:border-[#F97316] transition-all" placeholder="Ex: Ouagadougou">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Lien LinkedIn / Portfolio</label>
                                <input type="url" id="linkedin" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#F97316]/20 focus:border-[#F97316] transition-all" placeholder="https://...">
                            </div>
                        </div>

                        <div class="pt-6 mt-6 border-t border-slate-100 flex flex-col items-end">
                            <div id="saveMessage" class="hidden text-emerald-500 font-medium text-sm mb-4 flex items-center gap-2">
                                <i class="ph-fill ph-check-circle text-lg"></i> Informations enregistrées avec succès !
                            </div>
                            <button type="submit" class="px-8 py-3 bg-[#F97316] text-white font-bold rounded-xl shadow-lg shadow-[#F97316]/20 hover:bg-[#EA580C] transition-all">
                                Enregistrer le profil
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Right Column: Coins & History -->
            <div class="space-y-6">
                
                <!-- Kaïro Coins Card -->
                <div class="bg-slate-900 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 w-24 h-24 bg-[#F97316] rounded-full blur-2xl opacity-50"></div>
                    <div class="relative z-10">
                        <div class="flex items-center justify-between mb-2">
                            <h3 class="text-sm font-medium text-slate-400">Solde Kaïro Coins</h3>
                            <i class="ph-fill ph-coins text-[#F97316] text-xl"></i>
                        </div>
                        <div class="text-4xl font-extrabold mb-6" id="pointsDisplay">
                            -- <span class="text-base font-medium text-slate-400">pts</span>
                        </div>
                        <button class="w-full py-2.5 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl text-sm font-semibold transition-all">
                            Recharger
                        </button>
                    </div>
                </div>

                <!-- History -->
                <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                    <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2 pb-4 border-b border-slate-100">
                        <i class="ph-fill ph-clock-counter-clockwise text-[#F97316]"></i> Historique
                    </h3>
                    <div id="historyList" class="space-y-3">
                        <div class="text-center py-8 text-slate-400">
                            <i class="ph ph-spinner-gap text-3xl animate-spin text-[#F97316] mb-2"></i>
                            <p class="text-sm">Chargement...</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script type="module">
        import API from './assets/js/api.js';
        
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await API.getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            document.getElementById('userDisplayName').textContent = user.name || 'Candidat';
            document.getElementById('fullname').value = user.name || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('phone').value = user.phone || '';
            document.getElementById('specialty').value = user.specialty || '';
            document.getElementById('city').value = user.city || '';
            document.getElementById('linkedin').value = user.linkedin || '';
            document.getElementById('pointsDisplay').innerHTML = `${user.points || 0} <span class="text-base font-medium text-slate-400">pts</span>`;
            
            if (user.photoURL) {
                const preview = document.getElementById('avatarPreview');
                preview.src = user.photoURL;
                preview.classList.remove('hidden');
                document.querySelector('.avatar-placeholder').classList.add('hidden');
            }
            
            // Render History
            const historyList = document.getElementById('historyList');
            if (user.history && user.history.length > 0) {
                historyList.innerHTML = user.history.map(item => `
                    <div class="flex items-center gap-4 p-3 bg-slate-50 rounded-xl hover:bg-slate-100 transition-colors cursor-pointer">
                        <div class="w-10 h-10 rounded-lg bg-orange-100 text-[#F97316] flex items-center justify-center flex-shrink-0">
                            <i class="ph-fill ${item.type === 'CV' ? 'ph-file-pdf' : 'ph-file-text'} text-xl"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-slate-800">${item.title}</p>
                            <p class="text-xs text-slate-500">${item.date}</p>
                        </div>
                    </div>
                `).join('');
            } else {
                historyList.innerHTML = `<p class="text-sm text-slate-500 text-center py-4">Aucun document généré pour le moment.</p>`;
            }

            // Photo upload logic
            const photoInput = document.getElementById('photoInput');
            photoInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                // Show local preview immediately
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = document.getElementById('avatarPreview');
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    document.querySelector('.avatar-placeholder').classList.add('hidden');
                };
                reader.readAsDataURL(file);
                
                try {
                    await API.uploadAvatar(file);
                    // Avatar securely uploaded to Firebase Storage
                } catch (error) {
                    console.error('Erreur téléversement', error);
                    alert("Erreur lors du téléversement de la photo.");
                }
            });

            // Form Submit Logic
            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = 'Enregistrement... <i class="ph-bold ph-spinner animate-spin"></i>';
                btn.disabled = true;

                try {
                    const updates = {
                        name: document.getElementById('fullname').value,
                        specialty: document.getElementById('specialty').value,
                        phone: document.getElementById('phone').value,
                        city: document.getElementById('city').value,
                        linkedin: document.getElementById('linkedin').value
                    };
                    const updatedUser = await API.updateProfile(updates);
                    document.getElementById('userDisplayName').textContent = updatedUser.name;
                    
                    const msg = document.getElementById('saveMessage');
                    msg.classList.remove('hidden');
                    setTimeout(() => msg.classList.add('hidden'), 3000);
                } catch(error) {
                    alert(error.message);
                } finally {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>

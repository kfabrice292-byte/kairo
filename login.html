<!DOCTYPE html>
<html lang="fr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Kaïro</title>
    <link rel="icon" type="image/png" href="assets/img/Favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/base.css">
</head>
<body class="bg-slate-50 flex flex-col min-h-screen text-slate-800 font-sans relative">

    <!-- Decorative Background -->
    <div class="absolute inset-0 z-[-1] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-orange-100/50 via-white to-white pointer-events-none"></div>

    <!-- Header -->
    <header class="w-full absolute top-0 left-0 p-6 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-1 hover:opacity-80 transition-opacity">
                <img src="assets/img/logo.png" alt="Kaïro" class="h-10 w-auto">
            </a>
            <a href="register.html" class="text-sm font-medium text-slate-500 hover:text-[#F97316] transition-colors">
                Pas encore de compte ? S'inscrire
            </a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white/80 backdrop-blur-xl border border-slate-200 rounded-2xl p-8 shadow-[0_8px_30px_rgba(0,0,0,0.04)] animate-[slideUpFade_0.5s_ease-out]">
            
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-slate-900 mb-2 flex items-center justify-center gap-2">
                    Ravi de te revoir <i class="ph-fill ph-hand-waving text-[#F97316]"></i>
                </h1>
                <p class="text-sm text-slate-500">Connecte-toi pour reprendre tes documents là où tu les as laissés.</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ph ph-envelope-simple text-slate-400 text-lg"></i>
                        </div>
                        <input type="email" id="email" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#F97316]/20 focus:border-[#F97316] transition-all" placeholder="fabrice@email.com" required>
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label for="password" class="block text-sm font-medium text-slate-700">Mot de passe</label>
                        <a href="#" class="text-xs font-medium text-[#F97316] hover:underline">Mot de passe oublié ?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ph ph-lock text-slate-400 text-lg"></i>
                        </div>
                        <input type="password" id="password" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#F97316]/20 focus:border-[#F97316] transition-all" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="w-full flex items-center justify-center gap-2 py-3 px-4 bg-[#F97316] text-white font-semibold rounded-xl shadow-lg shadow-[#F97316]/20 hover:bg-[#EA580C] transition-all mt-6">
                    Se connecter <i class="ph-bold ph-sign-in"></i>
                </button>
            </form>

            <div class="mt-8 relative flex items-center justify-center">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-200"></div>
                </div>
                <div class="relative px-4 bg-white text-xs text-slate-400 font-medium">
                    OU CONTINUER AVEC
                </div>
            </div>

            <button type="button" id="googleLoginBtn" class="mt-6 w-full flex items-center justify-center gap-2 py-3 bg-white border border-slate-200 text-slate-700 font-bold rounded-xl hover:bg-slate-50 transition-all">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5" alt="Google">
                Continuer avec Google
            </button>

        </div>
    </main>

    <script type="module">
        import API from './assets/js/api.js';
        
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await API.getCurrentUser();
            if (user) {
                window.location.href = 'dashboard.html';
                return;
            }
            
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const btn = e.target.querySelector('button[type="submit"]');
                
                try {
                    btn.disabled = true;
                    btn.innerHTML = 'Connexion... <i class="ph-bold ph-spinner animate-spin"></i>';
                    await API.login(email, password);
                    window.location.href = 'dashboard.html';
                } catch (error) {
                    alert(error.message);
                    btn.disabled = false;
                    btn.innerHTML = 'Se connecter <i class="ph-bold ph-sign-in"></i>';
                }
            });

            document.getElementById('googleLoginBtn').addEventListener('click', async (e) => {
                const btn = e.currentTarget;
                try {
                    btn.disabled = true;
                    btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin"></i> Connexion...';
                    await API.loginWithGoogle();
                    window.location.href = 'dashboard.html';
                } catch (error) {
                    alert(error.message);
                    btn.disabled = false;
                    btn.innerHTML = '<img src="https://www.google.com/favicon.ico" class="w-5 h-5" alt="Google"> Continuer avec Google';
                }
            });
        });
    </script>
</body>
</html>

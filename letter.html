<!DOCTYPE html>
<html lang="fr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lettre de Motivation - Kaïro</title>
    <link rel="icon" type="image/png" href="assets/img/Favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/base.css">
</head>
<body class="bg-slate-50 flex flex-col min-h-screen text-slate-800 font-sans relative">

    <div class="absolute inset-0 z-[-1] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-orange-100/30 via-white to-white pointer-events-none"></div>

    <header class="w-full sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-200 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="dashboard.html" class="flex items-center gap-1 hover:opacity-80 transition-opacity">
                <img src="assets/img/logo.png" alt="Kaïro" class="h-8 object-contain">
            </a>
            <nav class="flex items-center gap-6">
                <a href="dashboard.html" class="text-sm font-medium px-5 py-2.5 rounded-full border border-slate-300 text-slate-700 hover:bg-slate-50 hover:border-slate-400 transition-all">
                    Retour
                </a>
            </nav>
        </div>
    </header>

    <main class="flex-1 w-full max-w-7xl mx-auto px-4 py-8 animate-[slideUpFade_0.4s_ease-out]">
        
        <div class="flex items-center gap-4 mb-8">
            <a href="dashboard.html" class="w-10 h-10 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-slate-50 transition-colors">
                <i class="ph-bold ph-arrow-left"></i>
            </a>
            <h1 class="text-3xl font-extrabold text-slate-900 font-outfit">Générateur de Lettre</h1>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Form Section -->
            <div class="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm">
                <form id="letterForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Entreprise ciblée</label>
                        <input type="text" id="company" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#F97316]/20 focus:border-[#F97316] transition-all" required placeholder="Ex: Orange Burkina">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Poste visé</label>
                        <input type="text" id="position" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#F97316]/20 focus:border-[#F97316] transition-all" required placeholder="Ex: Stagiaire Développeur">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Pourquoi eux ? (Motivation)</label>
                        <textarea id="motivation" rows="4" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#F97316]/20 focus:border-[#F97316] transition-all resize-none" required placeholder="Ex: Je suis passionné par l'innovation de vos services..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Une expérience/compétence clé</label>
                        <textarea id="highlight" rows="4" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#F97316]/20 focus:border-[#F97316] transition-all resize-none" required placeholder="Ex: J'ai développé une application web en React l'an dernier..."></textarea>
                    </div>
                    <button type="submit" class="w-full py-4 bg-[#F97316] text-white font-bold rounded-xl shadow-lg shadow-[#F97316]/20 hover:bg-[#EA580C] transition-all flex justify-center items-center gap-2">
                        Générer l'aperçu <i class="ph-bold ph-magic-wand"></i>
                    </button>
                </form>
            </div>

            <!-- Preview Section -->
            <div class="flex flex-col bg-slate-100 rounded-3xl p-2 border border-slate-200 overflow-hidden relative min-h-[600px]">
                <div class="flex items-center justify-between px-4 py-3 bg-white rounded-t-2xl border-b border-slate-100">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2"><i class="ph-fill ph-eye text-[#F97316]"></i> Aperçu</h3>
                    <button id="downloadLetterBtn" class="px-4 py-2 bg-slate-800 text-white text-sm font-medium rounded-lg hover:bg-slate-700 transition-colors flex items-center gap-2">
                        <i class="ph-bold ph-download-simple"></i> PDF
                    </button>
                </div>
                <div class="flex-1 bg-slate-200/50 p-4 flex justify-center items-start overflow-y-auto" id="letterSheet">
                    <!-- Fake paper representation -->
                    <div class="w-full max-w-[210mm] min-h-[297mm] bg-white shadow-md p-10 mx-auto text-slate-800 flex flex-col justify-center items-center text-center">
                        <i class="ph-thin ph-file-text text-6xl text-slate-300 mb-4"></i>
                        <p class="text-slate-400 font-medium">Remplis le formulaire pour générer ta lettre.</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script type="module">
        // Basic interactivity for styling demonstration
        document.getElementById('letterForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const sheet = document.getElementById('letterSheet').querySelector('div');
            sheet.innerHTML = `
                <div class="w-full text-left font-serif text-[11pt] space-y-6">
                    <div class="mb-10">
                        <p class="font-bold">Ton Nom</p>
                        <p>ton.email@example.com</p>
                    </div>
                    <div class="text-right mb-10">
                        <p class="font-bold">${document.getElementById('company').value}</p>
                        <p>Service Recrutement</p>
                    </div>
                    <p class="font-bold">Objet : Candidature au poste de ${document.getElementById('position').value}</p>
                    <p>Madame, Monsieur,</p>
                    <p>${document.getElementById('motivation').value}</p>
                    <p>${document.getElementById('highlight').value}</p>
                    <p>Dans l'attente de vous rencontrer, je vous prie d'agréer, Madame, Monsieur, mes salutations distinguées.</p>
                </div>
            `;
        });
    </script>
</body>
</html>
